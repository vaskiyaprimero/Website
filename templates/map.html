<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Воспоминания</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 70vh; width: 100%; border-radius: 1rem; }
    </style>
</head>
<body class="bg-gray-100 p-6 font-sans">
    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold text-gray-800">Карта воспоминаний Душанбе</h1>
            <a href="/" class="text-blue-500 hover:underline">← На главную</a>
        </div>

        <div id="map" class="shadow-lg border-2 border-gray-200"></div>
    </div>

    <script>
        // Инициализация карты (Координаты Душанбе)
        var map = L.map('map').setView([38.5739, 68.7846], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Добавляем маркер Статуи Исмоили Сомони
        var somoniMarker = L.marker([38.5737, 68.7863]).addTo(map);
        somoniMarker.bindPopup("<b>Статуя Исмоили Сомони</b><br>Нажмите на карту рядом, чтобы добавить воспоминание!");

        let currentLat = null;
        let currentLng = null;

        // Клик по любому месту на карте
        map.on('click', function(e) {
            currentLat = e.latlng.lat;
            currentLng = e.latlng.lng;

            let popupContent = `
                <div class="text-center p-2">
                    <h3 class="font-bold mb-3">Что делаем?</h3>
                    <button onclick="showAddForm()" class="block w-full bg-blue-500 text-white px-3 py-1 rounded mb-2 hover:bg-blue-600">Добавить воспоминание</button>
                    <button onclick="showMemories()" class="block w-full bg-green-500 text-white px-3 py-1 rounded hover:bg-green-600">Посмотреть воспоминания</button>
                    <div id="dynamic-content" class="mt-3 text-left"></div>
                </div>
            `;
            L.popup().setLatLng(e.latlng).setContent(popupContent).openOn(map);
        });

        // Форма добавления
        function showAddForm() {
            document.getElementById('dynamic-content').innerHTML = `
                <hr class="my-2">
                <form id="memoryForm" onsubmit="submitMemory(event)">
                    <textarea id="memText" placeholder="Было очень весело..." class="w-full border p-1 rounded mb-2 text-sm" required></textarea>
                    <input type="file" id="memFile" accept="image/*" class="w-full text-sm mb-2" required>
                    <button type="submit" class="bg-blue-700 text-white px-3 py-1 rounded w-full text-sm">Сохранить</button>
                </form>
            `;
        }

        // Отправка данных на сервер
        async function submitMemory(event) {
            event.preventDefault();
            let text = document.getElementById('memText').value;
            let file = document.getElementById('memFile').files[0];

            let formData = new FormData();
            formData.append("lat", currentLat);
            formData.append("lng", currentLng);
            formData.append("text", text);
            formData.append("file", file);

            document.getElementById('dynamic-content').innerHTML = "<p class='text-sm text-gray-500'>Загрузка...</p>";

            await fetch('/api/add_memory', { method: 'POST', body: formData });
            document.getElementById('dynamic-content').innerHTML = "<p class='text-sm text-green-600 font-bold'>Успешно сохранено!</p>";
        }

        // Просмотр воспоминаний
        async function showMemories() {
            document.getElementById('dynamic-content').innerHTML = "<p class='text-sm text-gray-500'>Ищем фото...</p>";

            let response = await fetch(`/api/get_memories?lat=${currentLat}&lng=${currentLng}`);
            let data = await response.json();

            if (data.memories.length === 0) {
                document.getElementById('dynamic-content').innerHTML = "<p class='text-sm text-gray-500'>Здесь пока нет воспоминаний.</p>";
                return;
            }

            let html = "<hr class='my-2'><div class='max-h-48 overflow-y-auto'>";
            data.memories.forEach(mem => {
                html += `
                    <div class="mb-3 border-b pb-2">
                        <img src="${mem.image_path}" class="w-full rounded mb-1">
                        <p class="text-sm italic">"${mem.text}"</p>
                    </div>`;
            });
            html += "</div>";
            document.getElementById('dynamic-content').innerHTML = html;
        }
    </script>
</body>
</html>
